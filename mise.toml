[tools]
bun = "latest"

[env]
_.file = '.env'

[tasks.generate]
run = "bun run db:generate"

[tasks.migrate]
run = "bun run db:migrate"

[tasks.studio]
run = "bun run db:studio"

[tasks.build]
run = "bun run build"

[tasks.seed]
run = "bun run src/seed.ts"

[tasks.publish]
run = "bun run build && bun publish"

[tasks.lint]
description = "Run ESLint"
run = "bun run lint"

[tasks.typecheck]
description = "Type-check with tsc --noEmit"
run = "bun run typecheck"

[tasks.schema]
description = "Generate Mermaid ER diagram into SCHEMA.md"
run = "bun run generate:schema"
